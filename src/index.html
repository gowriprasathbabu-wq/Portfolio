  <!-- Critical CSS inlined for LCP performance -->
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
    body{margin:0;padding:0;background:#0A0A0A;color:#fff;font-family:'Inter',system-ui,sans-serif;overflow-x:hidden}
    app-root{display:block}
    /* Page loading skeleton */
    .initial-loader{
      position:fixed;inset:0;
      background:#0A0A0A;
      display:flex;align-items:center;justify-content:center;
      z-index:9999;
      transition:opacity .4s ease;
    }
    .initial-loader.hide{opacity:0;pointer-events:none}
    .loader-logo{
      font-family:monospace;font-size:1.5rem;font-weight:700;
      color:#FF6B00;animation:fade 1.5s ease infinite;
    }
    @keyframes fade{0%,100%{opacity:.4}50%{opacity:1}}
  </style>
</head>
<body>
  <!-- Initial loader (hidden once Angular bootstraps) -->
  <div class="initial-loader" id="initial-loader" aria-hidden="true">
    <div class="loader-logo">&lt;GP/&gt;</div>
  </div>

  <!-- Skip navigation for accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <app-root></app-root>

  <script>
    // Hide loader once app is ready
    window.addEventListener('load', () => {
      requestAnimationFrame(() => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('hide');
          setTimeout(() => loader.remove(), 500);
        }
      });
    });
  </script>

  <style>
    .skip-link {
      position:absolute;top:-100%;left:0;
      background:#FF6B00;color:#ffffff;
      padding:12px 20px;font-weight:600;
      text-decoration:none;z-index:10000;
      border-radius:0 0 8px 0;
    }
    .skip-link:focus{top:0}
  </style>
</body>
</html>
