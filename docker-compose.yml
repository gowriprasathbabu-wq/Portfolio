version: '3.9'

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: gowri-portfolio:latest
    container_name: gowri-portfolio
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: gowri-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portfolio
    restart: unless-stopped
    profiles:
      - production
